<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INKOMANE | Support & Application Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        :root {
            --accent: #6366f1;
            --glass: rgba(255, 255, 255, 0.8);
            --shadow-3d: 0 20px 40px rgba(0,0,0,0.1);
        }

        body {
            background: #f8fafc;
            font-family: 'Inter', sans-serif;
            padding-top: 120px;
        }

        /* Modern Glass Navbar */
        .modern-nav {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 1100px;
            background: var(--glass); backdrop-filter: blur(15px);
            border-radius: 100px; padding: 12px 30px;
            z-index: 1000; display: flex; justify-content: space-between; align-items: center;
            box-shadow: var(--shadow-3d); border: 1px solid white;
        }

        /* Glass Cards */
        .glass-card {
            background: white;
            border-radius: 24px;
            padding: 30px;
            box-shadow: var(--shadow-3d);
            border: 1px solid rgba(255,255,255,0.5);
            transition: 0.3s;
        }

        .status-badge {
            padding: 5px 15px; border-radius: 50px; font-size: 0.75rem; font-weight: 700;
        }

        /* Auth Modal Styling */
        .auth-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); backdrop-filter: blur(10px);
            z-index: 2000; display: flex; align-items: center; justify-content: center;
        }

        .btn-modern {
            background: var(--accent); color: white; border-radius: 12px;
            padding: 10px 25px; border: none; font-weight: 600; transition: 0.3s;
        }

        .btn-modern:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(99, 102, 241, 0.3); }
    </style>
</head>
<body x-data="{ 
    view: 'track', 
    isLoggedIn: false, 
    authModal: false, 
    authType: 'login' 
}">

    <nav class="modern-nav">
        <div class="fw-bold fs-4" @click="view = 'track'" style="cursor: pointer;">INKOMANE</div>
        <div class="d-flex gap-3 align-items-center">
            <template x-if="!isLoggedIn">
                <div class="d-flex gap-2">
                    <button class="btn btn-link text-dark text-decoration-none" @click="authModal = true; authType = 'login'">Login</button>
                    <button class="btn btn-dark rounded-pill px-4" @click="authModal = true; authType = 'register'">Register</button>
                </div>
            </template>
            <template x-if="isLoggedIn">
                <div class="d-flex align-items-center gap-3">
                    <span class="small fw-bold">Hi, User</span>
                    <button class="btn btn-outline-danger btn-sm rounded-pill" @click="isLoggedIn = false">Logout</button>
                </div>
            </template>
        </div>
    </nav>

    <div class="container">
        <div x-show="view === 'track'">
            <div class="row mb-5">
                <div class="col-md-8">
                    <h2 class="fw-bold">Support Tracking</h2>
                    <p class="text-muted">View live status updates or submit a new support request.</p>
                </div>
                <div class="col-md-4 text-md-end">
                    <button class="btn btn-modern w-100 py-3" 
                            @click="isLoggedIn ? view = 'apply' : (authModal = true; authType = 'register')">
                        + Apply for Support Ticket
                    </button>
                </div>
            </div>

            <div class="glass-card">
                <div class="table-responsive">
                    <table class="table align-middle">
                        <thead>
                            <tr class="text-muted small text-uppercase">
                                <th>Ticket ID</th>
                                <th>Subject</th>
                                <th>Status</th>
                                <th>Last Activity</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td class="fw-bold">#INK-1092</td>
                                <td>Network configuration help</td>
                                <td><span class="status-badge bg-info text-dark">In Progress</span></td>
                                <td class="small text-muted">2 hours ago</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <div x-show="view === 'apply'" x-transition>
            <div class="max-auto" style="max-width: 700px; margin: 0 auto;">
                <button class="btn btn-link text-dark mb-3 text-decoration-none" @click="view = 'track'">← Back to Tracker</button>
                <div class="glass-card">
                    <h4 class="fw-bold mb-4">New Support Application</h4>
                    <form @submit.prevent="alert('Ticket Submitted!'); view = 'track'">
                        <div class="mb-3">
                            <label class="form-label small fw-bold">Issue Subject</label>
                            <input type="text" class="form-control rounded-3 py-2" placeholder="Briefly describe the issue" required>
                        </div>
                        <div class="row mb-3">
                            <div class="col">
                                <label class="form-label small fw-bold">Department</label>
                                <select class="form-select rounded-3">
                                    <option>Technical Support</option>
                                    <option>Billing</option>
                                </select>
                            </div>
                            <div class="col">
                                <label class="form-label small fw-bold">Priority</label>
                                <select class="form-select rounded-3">
                                    <option>Low</option>
                                    <option>Medium</option>
                                    <option>High</option>
                                </select>
                            </div>
                        </div>
                        <div class="mb-4">
                            <label class="form-label small fw-bold">Detailed Explanation</label>
                            <textarea class="form-control rounded-3" rows="5" required></textarea>
                        </div>
                        <button class="btn btn-modern w-100">Submit Application</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <div class="auth-modal" x-show="authModal" x-cloak x-transition>
        <div class="glass-card" style="width: 100%; max-width: 400px;" @click.away="authModal = false">
            <div class="text-center mb-4">
                <h3 class="fw-bold" x-text="authType === 'login' ? 'Login' : 'Register'"></h3>
                <p class="small text-muted">Access your INKOMANE dashboard</p>
            </div>
            
            <form @submit.prevent="isLoggedIn = true; authModal = false; view = 'apply'">
                <template x-if="authType === 'register'">
                    <input type="text" class="form-control mb-3 rounded-3" placeholder="Full Name" required>
                </template>
                <input type="email" class="form-control mb-3 rounded-3" placeholder="Email Address" required>
                <input type="password" class="form-control mb-4 rounded-3" placeholder="Password" required>
                
                <button class="btn btn-modern w-100" x-text="authType === 'login' ? 'Sign In' : 'Create Account'"></button>
                
                <div class="text-center mt-3">
                    <a href="#" class="small text-muted" @click="authType = (authType === 'login' ? 'register' : 'login')"
                       x-text="authType === 'login' ? 'Need an account? Register' : 'Have an account? Login'"></a>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
